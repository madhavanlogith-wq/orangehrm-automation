# Enable Spark Reporter
extent.reporter.spark.start=true

# Output report file (must be .html)
extent.reporter.spark.out=test-output/SparkReport.html

# Path to spark config file
extent.reporter.spark.config=src/test/resources/spark-config.xml

# Screenshot settings - Important: Use relative path from report
screenshot.dir=test-output/screenshots/
screenshot.rel.path=screenshots/